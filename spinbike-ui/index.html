<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#15151a" />
    <meta name="description" content="SpinBike - Reserve your spin class" />
    <title>SpinBike</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-file" href="favicon.svg" />
    <link data-trunk rel="copy-file" href="icon-192.png" />
    <link data-trunk rel="copy-file" href="icon-512.png" />
    <link data-trunk rel="copy-file" href="icon-192-maskable.png" />
    <link data-trunk rel="copy-file" href="icon-512-maskable.png" />
    <link data-trunk rel="rust" data-wasm-opt="z" />
</head>
<body>
    <noscript>SpinBike requires JavaScript enabled.</noscript>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
        // Capture the Chromium/Android install prompt so our own UI can
        // trigger it later (#110). The event has no typed web-sys binding,
        // so the Rust side reads window.__deferredInstallPrompt via
        // js_sys::Reflect. preventDefault() suppresses the browser's own
        // mini-infobar; we show our own "Pridat na plochu" button instead.
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__deferredInstallPrompt = e;
        });
        window.addEventListener('appinstalled', () => {
            window.__deferredInstallPrompt = null;
        });
    </script>
</body>
</html>
