name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  # Keep push and pull_request concurrency separate so a PR run from the same
  # branch doesn't swallow the push run that carries the deploy job.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  test-integrity:
    name: Test Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check for ignored tests
        run: |
          if grep -rn '#\[ignore\]' crates/ --include='*.rs'; then
            echo "ERROR: Found #[ignore] attributes in test code. All tests must run."
            exit 1
          fi

      - name: Ban continue-on-error in CI
        run: |
          # Use a regex that won't match this step's own text
          FOUND=$(grep -rn 'continue-on-error:.*true' .github/workflows/ | grep -v 'Ban continue-on-error' | grep -v '^\s*#' || true)
          if [ -n "$FOUND" ]; then
            echo "$FOUND"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-integrity
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Create placeholder dist for rust-embed
        run: |
          mkdir -p spinbike-ui/dist
          # Non-empty placeholder so static-file integration tests can assert
          # the handler returns content (distinguishing from Default::default()).
          echo "<!doctype html><title>spinbike-test</title>" > spinbike-ui/dist/index.html

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Create placeholder dist for rust-embed
        run: |
          mkdir -p spinbike-ui/dist
          # Non-empty placeholder so static-file integration tests can assert
          # the handler returns content (distinguishing from Default::default()).
          echo "<!doctype html><title>spinbike-test</title>" > spinbike-ui/dist/index.html

      - name: Run tests
        run: cargo test -p spinbike-core -p spinbike-server

  build-wasm:
    name: Build WASM (UI)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: spinbike-ui
          cache-on-failure: true

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Build UI
        run: cd spinbike-ui && trunk build --release

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: spinbike-ui-dist
          path: spinbike-ui/dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, build-wasm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Download WASM dist artifact
        uses: actions/download-artifact@v4
        with:
          name: spinbike-ui-dist
          path: spinbike-ui/dist/

      - name: Build server
        # rust-embed bakes spinbike-ui/dist/ into the binary at compile time,
        # so this build is only valid AFTER the dist artifact is downloaded
        # above. Force a re-bake in case incremental compilation skipped it.
        run: |
          touch crates/spinbike-server/src/routes/static_files.rs
          cargo build --bin spinbike-server --release

      - name: Upload server binary for deploy jobs
        # Deploy jobs run on the self-hosted runner with NO Rust toolchain
        # and no permission to compile. They download and install only.
        uses: actions/upload-artifact@v4
        with:
          name: spinbike-server
          path: target/release/spinbike-server
          retention-days: 7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'e2e/package-lock.json'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright
        run: cd e2e && npm ci && npx playwright install --with-deps chromium

      - name: Start server
        run: |
          PORT=8099 DATABASE_PATH=/tmp/spinbike-e2e.db JWT_SECRET=ci-test SPINBIKE_TEST_MODE=1 ./target/release/spinbike-server &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8099 > /dev/null 2>&1; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run E2E tests
        run: cd e2e && npx playwright test
        env:
          DATABASE_PATH: /tmp/spinbike-e2e.db

  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    # Generous timeout — public-repo CI is unmetered. The initial PR mutates
    # the entire codebase against near-empty main (~269 mutants × ~30s each).
    # Follow-up PRs only mutate diffed lines and finish in minutes.
    timeout-minutes: 240
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Create placeholder dist for rust-embed
        run: |
          mkdir -p spinbike-ui/dist
          # Non-empty placeholder so static-file integration tests can assert
          # the handler returns content (distinguishing from Default::default()).
          echo "<!doctype html><title>spinbike-test</title>" > spinbike-ui/dist/index.html

      - name: Compute PR diff vs base
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Run cargo-mutants on diff
        run: |
          # Mutate only PR-changed lines in the Rust crates.
          # --no-shuffle keeps output deterministic for log readability.
          # Exclude one-off CLI tools and the trivial server main() — these are
          # entry points that would need full E2E harnesses to mutate usefully.
          cargo mutants \
            --in-diff pr.diff \
            --timeout 60 \
            --no-shuffle \
            --exclude 'crates/spinbike-server/src/bin/*' \
            --package spinbike-core \
            --package spinbike-server

  deploy-dev:
    name: Deploy (dev)
    runs-on: [self-hosted, spinbike-deploy]
    needs: e2e  # e2e transitively depends on test + build-wasm
    timeout-minutes: 10
    # Only auto-deploy on direct pushes to dev; PR runs and other branches skip.
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    # Per-job concurrency so rapid dev pushes queue instead of cancelling mid-install.
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      # No checkout: deploy is pure download+install. No cargo / trunk on the
      # self-hosted runner — per project CLAUDE.md, Rust compiles generate
      # 10-20 GB of target/ artifacts and must stay on ubuntu-latest. The
      # release binary we install was built (and tested via E2E) in the
      # `e2e` job on ubuntu-latest.

      - name: Download server binary (built on ubuntu-latest in e2e)
        uses: actions/download-artifact@v4
        with:
          name: spinbike-server
          path: /tmp/spinbike-deploy-dev
          run-id: ${{ github.run_id }}

      - name: Install dev binary and restart dev service
        run: |
          install -Dm755 /tmp/spinbike-deploy-dev/spinbike-server \
            /opt/spinbike/dev/spinbike-server
          rm -rf /tmp/spinbike-deploy-dev
          sudo -n systemctl restart spinbike-dev.service

      - name: Dump last journalctl lines on any failure (for debugging)
        if: failure()
        run: sudo -n journalctl -u spinbike-dev.service -n 80 --no-pager

  deploy-prod:
    name: Deploy (prod)
    runs-on: [self-hosted, spinbike-deploy]
    needs: e2e  # e2e transitively depends on test + build-wasm
    timeout-minutes: 10
    # Only auto-deploy on direct pushes to main; PR runs and other branches skip.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Per-job concurrency so rapid main pushes queue instead of cancelling
    # mid-deploy. A cancel between backup + binary replace + restart would
    # leave prod on the old binary but with a confusingly-timestamped backup.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      # No checkout / cargo / trunk — same discipline as deploy-dev.

      - name: Backup prod DB (online SQLite backup, timestamped, keep last 10)
        run: |
          ts=$(date +%Y%m%d-%H%M%S)
          dest=/opt/spinbike/prod/backups/spinbike-${ts}.db
          # sqlite3 .backup uses SQLite's online backup API — it acquires a
          # shared lock, handles WAL checkpointing, and produces a complete,
          # restore-consistent copy even while spinbike.service is writing.
          # Plain cp on a WAL-mode DB can capture an inconsistent snapshot.
          sqlite3 /opt/spinbike/prod/spinbike.db ".timeout 5000" ".backup '${dest}'"
          # Customer data — lock down read perms.
          chmod 0600 "${dest}"
          # Keep only the 10 most recent; delete older ones.
          ls -t /opt/spinbike/prod/backups/spinbike-*.db 2>/dev/null \
            | tail -n +11 \
            | xargs -r rm -f
          echo "Backup written: spinbike-${ts}.db"
          ls -lh /opt/spinbike/prod/backups/

      - name: Download server binary (built on ubuntu-latest in e2e)
        uses: actions/download-artifact@v4
        with:
          name: spinbike-server
          path: /tmp/spinbike-deploy-prod
          run-id: ${{ github.run_id }}

      - name: Install prod binary and restart prod service
        run: |
          install -Dm755 /tmp/spinbike-deploy-prod/spinbike-server \
            /opt/spinbike/prod/spinbike-server
          rm -rf /tmp/spinbike-deploy-prod
          sudo -n systemctl restart spinbike.service

      - name: Dump last journalctl lines on any failure (for debugging)
        if: failure()
        run: sudo -n journalctl -u spinbike.service -n 80 --no-pager

  # Readiness + Playwright smoke run on ubuntu-latest — no Chromium install
  # or npm on the user's PC. Per env, shared step template via composable
  # env vars. Smoke is the gate that blocks the pipeline if the deploy
  # shipped a broken binary; deploy jobs above are install-only.
  smoke-dev:
    name: Smoke (dev)
    runs-on: ubuntu-latest
    needs: deploy-dev
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Wait for dev site health (HTTP + WebSocket upgrade)
        run: |
          # HTTP readiness
          for i in $(seq 1 30); do
            if curl -sfI https://spinbike-dev.newlevel.media > /dev/null; then
              echo "HTTP ready (attempt $i)"
              break
            fi
            [ "$i" -eq 30 ] && { echo "ERROR: dev HTTP did not respond within 60s"; exit 1; }
            sleep 2
          done
          # WebSocket upgrade readiness. The app opens wss://.../api/ws on
          # page load; if Cloudflare edge hasn't registered WS support for a
          # freshly-added tunnel hostname, it returns 400 and the browser
          # console logs an error, failing clean-console smoke assertions.
          for i in $(seq 1 30); do
            first_line=$(curl -s --http1.1 \
              -H "Connection: Upgrade" \
              -H "Upgrade: websocket" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              -H "Origin: https://spinbike-dev.newlevel.media" \
              --max-time 5 -i https://spinbike-dev.newlevel.media/api/ws 2>&1 | head -1)
            if echo "$first_line" | grep -q '101'; then
              echo "WS upgrade ready (attempt $i): $first_line"
              exit 0
            fi
            echo "WS not ready (attempt $i): $first_line"
            sleep 2
          done
          echo "ERROR: dev WS upgrade did not reach 101 within 60s"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'e2e/package-lock.json'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright
        run: cd e2e && npm ci && npx playwright install --with-deps chromium

      - name: Run smoke tests against dev
        run: cd e2e && SMOKE_BASE_URL=https://spinbike-dev.newlevel.media npx playwright test -g '@smoke'

  smoke-prod:
    name: Smoke (prod)
    runs-on: ubuntu-latest
    needs: deploy-prod
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Wait for prod site health (HTTP + WebSocket upgrade)
        run: |
          for i in $(seq 1 30); do
            if curl -sfI https://spinbike.newlevel.media > /dev/null; then
              echo "HTTP ready (attempt $i)"
              break
            fi
            [ "$i" -eq 30 ] && { echo "ERROR: prod HTTP did not respond within 60s"; exit 1; }
            sleep 2
          done
          for i in $(seq 1 30); do
            first_line=$(curl -s --http1.1 \
              -H "Connection: Upgrade" \
              -H "Upgrade: websocket" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              -H "Origin: https://spinbike.newlevel.media" \
              --max-time 5 -i https://spinbike.newlevel.media/api/ws 2>&1 | head -1)
            if echo "$first_line" | grep -q '101'; then
              echo "WS upgrade ready (attempt $i): $first_line"
              exit 0
            fi
            echo "WS not ready (attempt $i): $first_line"
            sleep 2
          done
          echo "ERROR: prod WS upgrade did not reach 101 within 60s"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'e2e/package-lock.json'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright
        run: cd e2e && npm ci && npx playwright install --with-deps chromium

      - name: Run smoke tests against prod
        run: cd e2e && SMOKE_BASE_URL=https://spinbike.newlevel.media npx playwright test -g '@smoke'

  check-version-bump:
    name: Version Bump Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare VERSION with main
        run: |
          pr_version=$(cat VERSION)
          git checkout origin/main -- VERSION
          main_version=$(cat VERSION)
          git checkout HEAD -- VERSION

          echo "PR version:   $pr_version"
          echo "Main version: $main_version"

          if [ "$pr_version" = "$main_version" ]; then
            echo "ERROR: VERSION ($pr_version) has not been bumped from main ($main_version)."
            exit 1
          fi

          # Simple semver comparison: PR version must be strictly greater
          printf '%s\n%s\n' "$main_version" "$pr_version" | sort -V | head -n1 | grep -qx "$main_version"
          if [ $? -ne 0 ]; then
            echo "ERROR: PR version ($pr_version) is not greater than main version ($main_version)."
            exit 1
          fi

          if [ "$pr_version" = "$main_version" ]; then
            echo "ERROR: Versions are equal after sort check."
            exit 1
          fi

          echo "OK: Version bumped from $main_version to $pr_version."
