name: Deploy

# Fires after the CI workflow completes on dev. Only deploys when CI passed
# AND the trigger was a push to dev (not a pull_request CI run).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-spinbike
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + restart + smoke test
    runs-on: [self-hosted, spinbike-deploy]
    timeout-minutes: 30
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev' &&
      github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build WASM frontend (Trunk)
        run: |
          cd spinbike-ui
          trunk build --release

      - name: Force rust-embed to re-bake dist
        # rust-embed caches at compile time; if static_files.rs hasn't changed,
        # cargo skips recompilation and the new dist/ never gets embedded.
        run: touch crates/spinbike-server/src/routes/static_files.rs

      - name: Build release server
        run: cargo build --release --bin spinbike-server

      - name: Install binary and restart service
        run: |
          # `install` unlinks the destination first, so the running systemd
          # process keeps its mmap to the old inode while we swap in the new
          # file. Without this we'd hit ETXTBSY on an in-use binary.
          install -m 755 target/release/spinbike-server \
            /home/newlevel/devel/spinbike/target/release/spinbike-server
          sudo -n systemctl restart spinbike.service

      - name: Wait for live site health
        run: |
          for i in $(seq 1 30); do
            if curl -sfI https://spinbike.newlevel.media > /dev/null; then
              echo "Live site responding (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: live site did not respond within 60s"
          sudo -n systemctl status spinbike.service --no-pager || true
          exit 1

      - name: Post-deploy smoke tests (Playwright against live)
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium
          SMOKE_BASE_URL=https://spinbike.newlevel.media \
            npx playwright test -g '@smoke'
